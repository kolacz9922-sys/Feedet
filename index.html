<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Feeder Trener PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --bg-card: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --green: linear-gradient(135deg, #10b981, #059669);
            --yellow: linear-gradient(135deg, #f59e0b, #d97706);
            --red: linear-gradient(135deg, #ef4444, #b91c1c);
            --blue: linear-gradient(135deg, #3b82f6, #2563eb);
            --dark: linear-gradient(135deg, #334155, #1e293b);
            --glass: rgba(255,255,255,0.05);
        }
        * { box-sizing: border-box; font-family: sans-serif; user-select: none; }
        
        /* KLUCZOWA POPRAWKA NA TELEFONY: min-height: 100dvh naprawia ucięte buttony */
        body { margin: 0; background: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; overflow-y: auto; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 12px 15px; background: rgba(0,0,0,0.4); font-size: 12px; font-weight: bold; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .weather { color: #fbbf24; }
        .controls { display: flex; gap: 12px; align-items: center; }
        .icon-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 0; }
        .clock { color: #60a5fa; }

        .timers { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; margin: 10px 15px; background: var(--glass); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .timer-box { text-align: center; }
        .timer-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .timer-val { font-size: 28px; font-weight: 900; }
        #intervalTime { color: #10b981; }

        .actions { flex-grow: 1; display: flex; flex-direction: column; padding: 0 15px 15px; gap: 12px; }
        .btn { flex: 1; border: none; border-radius: 20px; font-size: 24px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.1s; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn:active { transform: scale(0.97); }
        .btn-p { background: var(--green); }
        .btn-b { background: var(--yellow); color: #451a03; }
        .btn-r { background: var(--red); }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); }

        /* DOLNY PASEK ZAWSZE NA DOLE EKRANU */
        .nav { display: flex; gap: 8px; padding: 15px; background: rgba(0,0,0,0.6); border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; position: sticky; bottom: 0; z-index: 10; }
        .nav-btn { flex: 1; padding: 12px 0; border: none; border-radius: 12px; font-size: 11px; font-weight: 800; color: white; background: var(--dark); text-transform: uppercase; }
        #startBtn { background: var(--blue); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-card); width: 100%; max-width: 500px; max-height: 90vh; border-radius: 20px; padding: 20px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        h3 { margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; margin-bottom: 15px; font-family: inherit; }
        .btn-modal { width: 100%; padding: 14px; background: var(--blue); border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; margin-top: 5px; }
        
        .chart-container { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px; margin-bottom: 15px; height: 180px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; margin-bottom: 15px; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; font-size: 12px; color: var(--text-muted); }
        .stat-val { display: block; font-size: 18px; font-weight: bold; color: white; margin-top: 4px; }
        .history-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="weather" id="weatherDisplay">⛅ Pobieranie...</div>
        <div class="controls">
            <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" style="color:var(--text-muted);">🎙️ Wył</button>
            <span class="clock" id="clock">00:00:00</span>
            <button class="icon-btn" onclick="toggleFS()" style="font-size: 18px;">🔲</button>
        </div>
    </div>

    <div class="timers">
        <div class="timer-box">
            <div class="timer-label">Czas Łowienia</div>
            <div class="timer-val" id="sessionTime">04:00:00</div>
        </div>
        <div class="timer-box">
            <div class="timer-label">Zestaw w wodzie</div>
            <div class="timer-val" id="intervalTime">03:00</div>
        </div>
        <button class="icon-btn" onclick="openModal('settingsModal')" style="font-size:24px; color:var(--text-muted);">⚙️</button>
    </div>

    <div class="actions">
        <button class="btn btn-p" id="btnP" onclick="logEvent('PRZERZUĆ')" disabled>🔄 Przerzuć</button>
        <button class="btn btn-b" id="btnB" onclick="logEvent('BRANIE')" disabled>⚠️ Branie</button>
        <button class="btn btn-r" id="btnR" onclick="logEvent('RYBA')" disabled>🐟 Ryba</button>
    </div>

    <div class="nav">
        <button class="nav-btn" id="startBtn" onclick="toggleSession()">▶ Start</button>
        <button class="nav-btn" onclick="openChartModal()">📊 Wykres</button>
        <button class="nav-btn" onclick="openHistory()">📁 Historia</button>
        <button class="nav-btn" onclick="openModal('saveModal')">💾 Zapisz</button>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>⚙️ Ustawienia Czasu</h3>
            <label style="font-size:12px;color:var(--text-muted);">Czas łowienia (godziny)</label>
            <input type="number" id="inpHours" value="4" min="1">
            <label style="font-size:12px;color:var(--text-muted);">Zestaw w wodzie (minuty)</label>
            <input type="number" id="inpMins" value="3" min="1">
            <div style="display:flex; gap:10px;">
                <button class="btn-modal" style="background:var(--dark);" onclick="closeModal('settingsModal')">Anuluj</button>
                <button class="btn-modal" onclick="applySettings()">Zapisz</button>
            </div>
        </div>
    </div>

    <div id="saveModal" class="modal">
        <div class="modal-content">
            <h3>💾 Zapisz Sesję</h3>
            <input type="text" id="inpName" placeholder="Nazwa łowiska / Zawody">
            <textarea id="inpNotes" rows="4" placeholder="Dziennik Wędkarski (zanęta, wnioski...)"></textarea>
            <div style="display:flex; gap:10px;">
                <button class="btn-modal" style="background:var(--dark);" onclick="closeModal('saveModal')">Anuluj</button>
                <button class="btn-modal" style="background:var(--green);" onclick="saveSession()">Zapisz do Historii</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content">
            <h3>📁 Historia Sesji</h3>
            <div id="historyList"></div>
            <button class="btn-modal" style="background:var(--dark);" onclick="closeModal('historyModal')">Zamknij</button>
        </div>
    </div>

    <div id="chartModal" class="modal">
        <div class="modal-content" style="padding:0; background:transparent; border:none; max-width:800px;">
            <div id="exportArea" style="background:var(--bg-card); padding:20px; border-radius:20px;">
                <h3 id="chartTitle">Analiza Sesji</h3>
                <div class="chart-container"><canvas id="scatterChart"></canvas></div>
                <div class="chart-container"><canvas id="lineChart"></canvas></div>
                
                <div class="stats-grid">
                    <div class="stat-box">🐟 Ryby <span class="stat-val" id="stRyby" style="color:#ef4444;">0</span></div>
                    <div class="stat-box">⚠️ Brania <span class="stat-val" id="stBrania" style="color:#f59e0b;">0</span></div>
                    <div class="stat-box">🔄 Rzuty <span class="stat-val" id="stRzuty" style="color:#10b981;">0</span></div>
                </div>
                
                <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; font-size:12px; margin-bottom:10px;">
                    <span style="color:var(--text-muted);">Pogoda:</span> <strong id="stPogoda">--</strong>
                </div>
                <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; font-size:12px; font-style:italic;">
                    <span style="color:var(--text-muted);">Dziennik:</span> <span id="stNotes">Brak notatek.</span>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-modal" style="background:var(--dark);" onclick="closeModal('chartModal')">Zamknij</button>
                <button class="btn-modal" onclick="exportJPG()">📸 Pobierz (JPG)</button>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let cHours = 4, cMins = 3;
        let secElapsed = 0, secInterval = 180;
        let timerMain, timerWeather;
        let events = [], pressures = [];
        let curTemp = "--", curPres = "--", curWind = "--";
        let c1, c2;

        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('pl-PL'), 1000);
        
        // POPRAWKA: Pełny ekran działający w telefonach
        function toggleFS() { 
            let elem = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (elem.requestFullscreen) { elem.requestFullscreen(); }
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
            }
        }

        let aCtx;
        function playBeep() {
            if(!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(aCtx.state === 'suspended') aCtx.resume();
            let o = aCtx.createOscillator(), g = aCtx.createGain();
            o.connect(g); g.connect(aCtx.destination);
            o.frequency.value = 1000; o.type = 'triangle'; g.gain.value = 0.1;
            o.start(); setTimeout(() => o.stop(), 150);
            if(navigator.vibrate) navigator.vibrate([100]);
        }

        const SRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let rec = null, isList = false;

        if(SRec) {
            rec = new SRec(); rec.lang = 'pl-PL'; rec.continuous = true;
            rec.onresult = (e) => {
                if(!isList) return;
                const txt = e.results[e.results.length-1][0].transcript.toLowerCase();
                
                if(txt.includes("trener")) {
                    if(txt.includes("ryba") || txt.includes("mam")) handleVoice('RYBA');
                    else if(txt.includes("branie") || txt.includes("puste")) handleVoice('BRANIE');
                    else if(txt.includes("przerzuć") || txt.includes("rzut")) handleVoice('PRZERZUĆ');
                    else if(txt.includes("czas na")) {
                        const match = txt.match(/\d+/);
                        const words = {"jeden":1,"dwa":2,"trzy":3,"cztery":4,"pięć":5,"sześć":6,"siedem":7,"osiem":8,"dziewięć":9,"dziesięć":10};
                        let val = match ? parseInt(match[0]) : null;
                        if(!val) for(let w in words) if(txt.includes(w)) val = words[w];
                        
                        if(val) {
                            cMins = val; secInterval = val * 60;
                            document.getElementById('intervalTime').innerText = formatTime(secInterval);
                            if(navigator.vibrate) navigator.vibrate(500);
                        }
                    }
                }
            };
            rec.onend = () => { if(isList) rec.start(); };
        }

        function handleVoice(action) {
            isList = false; rec.stop(); 
            logEvent(action, true);    
            setTimeout(() => { if(!isList) { isList = true; rec.start(); } }, 1500); 
        }

        function toggleVoice() {
            if(!rec) return alert("Brak wsparcia mowy.");
            isList = !isList;
            isList ? rec.start() : rec.stop();
            const b = document.getElementById('voiceBtn');
            b.innerText = isList ? "🎙️ Wł" : "🎙️ Wył";
            b.style.color = isList ? "#ef4444" : "var(--text-muted)";
        }

        function formatTime(s, h=false) {
            if(s<0) s=0;
            let hh = Math.floor(s/3600), mm = Math.floor((s%3600)/60), ss = s%60;
            let p = x => x.toString().padStart(2,'0');
            return h ? `${p(hh)}:${p(mm)}:${p(ss)}` : `${p(mm)}:${p(ss)}`;
        }

        async function getWeather() {
            try {
                let res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=50.06&longitude=19.94&current=temperature_2m,surface_pressure,wind_speed_10m,wind_direction_10m`);
                let d = await res.json();
                curTemp = d.current.temperature_2m; curPres = d.current.surface_pressure; 
                let wd = d.current.wind_direction_10m; let dir = ['N','NE','E','SE','S','SW','W','NW'][Math.round(wd/45)%8];
                curWind = `${d.current.wind_speed_10m} km/h (${dir})`;
                document.getElementById('weatherDisplay').innerText = `⛅ ${curTemp}°C | ${curPres} hPa | ${curWind}`;
                return curPres;
            } catch(e) { return null; }
        }
        getWeather();

        function toggleSession() {
            isRunning = !isRunning;
            const b = document.getElementById('startBtn');
            ['btnP','btnB','btnR'].forEach(id => document.getElementById(id).disabled = !isRunning);
            
            if(isRunning) {
                b.innerText = "⏸ Pauza"; b.style.background = "var(--dark)";
                getWeather().then(p => { if(p) pressures.push({x: secElapsed/60, y: p}); });
                weatherInterval = setInterval(() => { getWeather().then(p => { if(p) pressures.push({x: secElapsed/60, y: p}); }); }, 900000);
                
                timerMain = setInterval(() => {
                    secElapsed++;
                    document.getElementById('sessionTime').innerText = formatTime((cHours*3600)-secElapsed, true);
                    if(secInterval > 0) {
                        secInterval--;
                        let it = document.getElementById('intervalTime');
                        it.innerText = formatTime(secInterval);
                        if(secInterval === 0) { it.style.color = "#ef4444"; playBeep(); }
                    }
                }, 1000);
            } else {
                b.innerText = "▶ Start"; b.style.background = "var(--blue)";
                clearInterval(timerMain); clearInterval(weatherInterval);
            }
        }

        function logEvent(type, fromVoice = false) {
            if(!isRunning) return;
            events.push({ time: secElapsed, type: type });
            
            secInterval = cMins * 60;
            let it = document.getElementById('intervalTime');
            it.style.color = "#10b981"; it.innerText = formatTime(secInterval);
            
            if(!fromVoice) playBeep(); else if(navigator.vibrate) navigator.vibrate([300]);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function applySettings() {
            cHours = parseInt(document.getElementById('inpHours').value);
            cMins = parseInt(document.getElementById('inpMins').value);
            secInterval = cMins * 60;
            document.getElementById('intervalTime').innerText = formatTime(secInterval);
            if(!isRunning) document.getElementById('sessionTime').innerText = formatTime(cHours*3600, true);
            closeModal('settingsModal');
        }

        function drawCharts(evData, prData, title, wData, notes) {
            document.getElementById('chartTitle').innerText = title;
            document.getElementById('stRyby').innerText = evData.filter(e => e.type==='RYBA').length;
            document.getElementById('stBrania').innerText = evData.filter(e => e.type==='BRANIE').length;
            document.getElementById('stRzuty').innerText = evData.filter(e => e.type==='PRZERZUĆ').length;
            document.getElementById('stPogoda').innerText = wData ? `${wData.t}°C, ${wData.p} hPa, Wiatr: ${wData.w}` : "Brak danych";
            document.getElementById('stNotes').innerText = notes || "Brak notatek.";
            
            if(c1) c1.destroy(); if(c2) c2.destroy();
            let maxX = Math.max(60, Math.ceil((evData.length ? evData[evData.length-1].time : secElapsed)/60) + 5);
            
            Chart.defaults.color = '#94a3b8';
            c1 = new Chart(document.getElementById('scatterChart'), {
                type: 'scatter',
                data: { datasets: [
                    { label: 'Rzut', data: evData.filter(e=>e.type==='PRZERZUĆ').map(e=>({x:e.time/60, y:1})), backgroundColor: '#10b981' },
                    { label: 'Branie', data: evData.filter(e=>e.type==='BRANIE').map(e=>({x:e.time/60, y:2})), backgroundColor: '#f59e0b', pointRadius:5 },
                    { label: 'Ryba', data: evData.filter(e=>e.type==='RYBA').map(e=>({x:e.time/60, y:3})), backgroundColor: '#ef4444', pointRadius:6 }
                ]},
                options: { maintainAspectRatio: false, plugins: {legend:{display:false}}, scales: { x: {type:'linear', min:0, max:maxX, display:false}, y: {min:0, max:4, ticks:{stepSize:1, callback:v=>['','Rzut','Branie','Ryba',''][v]}} } }
            });

            c2 = new Chart(document.getElementById('lineChart'), {
                type: 'line',
                data: { datasets: [{ data: prData, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.4 }]},
                options: { maintainAspectRatio: false, plugins: {legend:{display:false}}, scales: { x: {type:'linear', min:0, max:maxX, title:{display:true, text:'Czas (minuty)'}} } }
            });
            openModal('chartModal');
        }

        function openChartModal() { drawCharts(events, pressures, "Analiza na żywo", {t:curTemp, p:curPres, w:curWind}, ""); }
        
        function exportJPG() {
            let trg = document.getElementById('exportArea');
            html2canvas(trg, {scale: 2, backgroundColor: "#1e293b"}).then(canvas => {
                let a = document.createElement('a'); a.download = 'Raport.jpg';
                a.href = canvas.toDataURL('image/jpeg', 0.9); a.click();
            });
        }

        function saveSession() {
            let hist = JSON.parse(localStorage.getItem('f_hist')) || [];
            hist.push({
                id: Date.now(),
                name: document.getElementById('inpName').value || 'Trening',
                date: new Date().toLocaleString(),
                notes: document.getElementById('inpNotes').value,
                events: events, pressures: pressures,
                weather: {t:curTemp, p:curPres, w:curWind}
            });
            localStorage.setItem('f_hist', JSON.stringify(hist));
            closeModal('saveModal'); alert('Sesja zapisana pomyślnie!'); location.reload();
        }

        function openHistory() {
            let hist = JSON.parse(localStorage.getItem('f_hist')) || [];
            let list = document.getElementById('historyList'); list.innerHTML = '';
            if(!hist.length) list.innerHTML = '<p style="text-align:center; color:gray;">Brak zapisów</p>';
            hist.slice().reverse().forEach(h => {
                let div = document.createElement('div'); div.className = 'history-item';
                div.innerHTML = `<strong style="color:white;">${h.name}</strong><br><small>${h.date}</small>`;
                div.onclick = () => { closeModal('historyModal'); drawCharts(h.events, h.pressures, h.name, h.weather, h.notes); };
                list.appendChild(div);
            });
            openModal('historyModal');
        }
    </script>
</body>
</html>
