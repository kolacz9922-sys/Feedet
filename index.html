<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <title>Feeder Trener PRO v2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --grad-green: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --grad-yellow: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            --grad-red: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            --grad-blue: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --grad-dark: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body { font-family: sans-serif; background: var(--bg-gradient); color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-y: auto; user-select: none; }
        .top-bar { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(0,0,0,0.3); font-size: 11px; align-items: center; border-bottom: 1px solid var(--glass-border); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin: 10px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; }
        .timer-value { font-size: 24px; font-weight: 900; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; padding: 15px; gap: 10px; }
        .action-btn { flex: 1; border: none; border-radius: 20px; font-size: 22px; font-weight: 900; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-przerzuc { background: var(--grad-green); }
        .btn-branie { background: var(--grad-yellow); color: #78350f; }
        .btn-ryba { background: var(--grad-red); }
        .footer { padding: 15px; display: flex; gap: 8px; background: rgba(0,0,0,0.3); }
        .menu-btn { flex: 1; padding: 12px; font-size: 10px; border-radius: 10px; border: none; color: white; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 20px; width: 80%; }
        #exportArea { background: #1e293b; padding: 15px; border-radius: 15px; }
        .chart-box { background: rgba(0,0,0,0.2); margin-bottom: 10px; height: 150px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span id="weatherDisplay">⛅ Pobieranie pogody...</span>
        <div>
            <button id="voiceBtn" onclick="toggleVoiceControl()" style="background:none; border:none; color:#94a3b8; font-weight:bold;">🎙️ Głos Wył.</button>
            <span id="realClock" style="margin-left:10px; color:#60a5fa;">00:00</span>
        </div>
    </div>

    <div class="header">
        <div><small>CZAS ŁOWIENIA</small><div class="timer-value" id="sessionTimer">04:00:00</div></div>
        <div><small>W WODZIE</small><div class="timer-value" id="intervalTimer" style="color:#10b981;">03:00</div></div>
        <button onclick="openSettings()" style="background:none; border:none; font-size:20px;">⚙️</button>
    </div>

    <div class="main-content">
        <button id="btnP" class="action-btn btn-przerzuc" onclick="logEvent('PRZERZUĆ')" disabled>🔄 PRZERZUĆ</button>
        <button id="btnB" class="action-btn btn-branie" onclick="logEvent('BRANIE')" disabled>⚠️ BRANIE</button>
        <button id="btnR" class="action-btn btn-ryba" onclick="logEvent('RYBA')" disabled>🐟 RYBA</button>
    </div>

    <div class="footer">
        <button class="menu-btn" id="startBtn" onclick="toggleSession()" style="background:var(--grad-blue);">▶ START</button>
        <button class="menu-btn" onclick="showCurrentChart()" style="background:var(--grad-dark);">📊 WYKRES</button>
        <button class="menu-btn" onclick="openHistory()" style="background:var(--grad-dark);">📁 HISTORIA</button>
        <button class="menu-btn" onclick="openSaveModal()" style="background:var(--grad-dark);">💾 ZAPISZ</button>
    </div>

    <div id="chartModal" class="modal">
        <div class="modal-content">
            <div id="exportArea">
                <h3 id="chartTitle" style="color:white; margin:0;">Raport Sesji</h3>
                <div class="chart-box"><canvas id="sessionChart"></canvas></div>
                <div class="chart-box"><canvas id="pressureChart"></canvas></div>
                <div id="sumStats" style="font-size:12px; color:#94a3b8;"></div>
            </div>
            <button onclick="closeChart()" style="width:100%; padding:10px; margin-top:10px; border-radius:10px;">ZAMKNIJ</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>Ustawienia</h3>
            <label>Tura (h):</label><input type="number" id="setHours" value="4" style="width:100%; margin-bottom:10px;">
            <label>Interwał (min):</label><input type="number" id="setInterval" value="3" style="width:100%;">
            <button onclick="applySettings()" style="width:100%; margin-top:15px; padding:10px; background:var(--grad-blue); color:white; border-radius:10px;">ZASTOSUJ</button>
        </div>
    </div>

    <div id="saveModal" class="modal">
        <div class="modal-content">
            <h3>Zapisz Sesję</h3>
            <input type="text" id="saveName" placeholder="Nazwa łowiska" style="width:100%; padding:10px; margin-bottom:10px;">
            <textarea id="saveNotes" placeholder="Notatki (zanęta, pogoda...)" style="width:100%; height:80px;"></textarea>
            <button onclick="confirmSave()" style="width:100%; margin-top:15px; padding:10px; background:var(--grad-green); color:white; border-radius:10px;">POTWIERDŹ ZAPIS</button>
        </div>
    </div>

    <script>
        let isSessionActive = false, sessionSecondsElapsed = 0, configHours = 4, configIntervalMin = 3;
        let intervalSeconds = 180, eventsLog = [], pressureLog = [], mainInterval, weatherInterval;
        let chart1 = null, chart2 = null;

        const sessionTimerEl = document.getElementById('sessionTimer'), intervalTimerEl = document.getElementById('intervalTimer');
        const startBtn = document.getElementById('startBtn'), actionBtns = [document.getElementById('btnP'), document.getElementById('btnB'), document.getElementById('btnR')];

        // Zegarek
        setInterval(() => { document.getElementById('realClock').innerText = new Date().toLocaleTimeString('pl-PL', {hour: '2-digit', minute:'2-digit', second:'2-digit'}); }, 1000);

        // GŁOS - KLUCZOWA POPRAWKA
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null, isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'pl-PL';
            recognition.continuous = true;
            recognition.onresult = (event) => {
                if (!isListening) return;
                const txt = event.results[event.results.length - 1][0].transcript.toLowerCase();
                if (txt.includes("ryba") || txt.includes("mam")) handleVoice('RYBA');
                else if (txt.includes("branie") || txt.includes("puste")) handleVoice('BRANIE');
                else if (txt.includes("przerzuć") || txt.includes("rzut")) handleVoice('PRZERZUĆ');
                else if (txt.includes("czas na")) {
                    const n = txt.match(/\d+/);
                    if(n) { configIntervalMin = parseInt(n[0]); intervalSeconds = configIntervalMin * 60; if(navigator.vibrate) navigator.vibrate(500); }
                }
            };
            recognition.onend = () => { if(isListening) recognition.start(); };
        }

        function handleVoice(type) {
            isListening = false; recognition.stop();
            logEvent(type, true); // TRUE = wycisza pikanie
            setTimeout(() => { if(!isListening) { isListening = true; recognition.start(); } }, 1500);
        }

        function toggleVoiceControl() {
            if(!recognition) return;
            isListening = !isListening;
            isListening ? recognition.start() : recognition.stop();
            document.getElementById('voiceBtn').innerText = isListening ? "🎙️ Słucha..." : "🎙️ Głos Wył.";
            document.getElementById('voiceBtn').style.color = isListening ? "#ef4444" : "#94a3b8";
        }

        // LOGIKA
        let audioCtx;
        function playBeep() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 1000; gain.gain.value = 0.1;
            osc.start(); setTimeout(() => osc.stop(), 200);
            if(navigator.vibrate) navigator.vibrate(200);
        }

        function logEvent(type, fromVoice = false) {
            if(!isSessionActive) return;
            eventsLog.push({ timeSec: sessionSecondsElapsed, action: type });
            intervalSeconds = configIntervalMin * 60;
            intervalTimerEl.style.color = "#10b981";
            if (!fromVoice) playBeep(); else if(navigator.vibrate) navigator.vibrate(300);
        }

        function toggleSession() {
            isSessionActive = !isSessionActive;
            if (isSessionActive) {
                startBtn.innerText = "⏸ PAUZA";
                actionBtns.forEach(b => b.disabled = false);
                mainInterval = setInterval(() => {
                    sessionSecondsElapsed++;
                    let left = (configHours * 3600) - sessionSecondsElapsed;
                    sessionTimerEl.innerText = new Date(left * 1000).toISOString().substr(11, 8);
                    if (intervalSeconds > 0) {
                        intervalSeconds--;
                        intervalTimerEl.innerText = new Date(intervalSeconds * 1000).toISOString().substr(14, 5);
                        if(intervalSeconds === 0) { intervalTimerEl.style.color = "#ef4444"; playBeep(); }
                    }
                }, 1000);
                updateWeather();
                weatherInterval = setInterval(updateWeather, 900000);
            } else {
                startBtn.innerText = "▶ START";
                clearInterval(mainInterval); clearInterval(weatherInterval);
            }
        }

        async function updateWeather() {
            try {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=50.06&longitude=19.94&current=temperature_2m,surface_pressure`);
                const d = await r.json();
                const p = d.current.surface_pressure;
                document.getElementById('weatherDisplay').innerText = `⛅ ${d.current.temperature_2m}°C | ${p} hPa`;
                if(isSessionActive) pressureLog.push({timeSec: sessionSecondsElapsed, pressure: p});
            } catch(e) {}
        }

        function showCurrentChart() {
            document.getElementById('chartModal').style.display = 'flex';
            if(chart1) chart1.destroy(); if(chart2) chart2.destroy();
            const maxX = Math.max(60, Math.ceil(sessionSecondsElapsed / 60) + 5);
            chart1 = new Chart(document.getElementById('sessionChart'), {
                type: 'scatter',
                data: { datasets: [
                    { label: 'Rzut', data: eventsLog.filter(e => e.action === 'PRZERZUĆ').map(e => ({x: e.timeSec/60, y: 1})), backgroundColor: '#10b981' },
                    { label: 'Branie', data: eventsLog.filter(e => e.action === 'BRANIE').map(e => ({x: e.timeSec/60, y: 2})), backgroundColor: '#f59e0b' },
                    { label: 'Ryba', data: eventsLog.filter(e => e.action === 'RYBA').map(e => ({x: e.timeSec/60, y: 3})), backgroundColor: '#ef4444' }
                ]},
                options: { scales: { x: { type: 'linear', min: 0, max: maxX }, y: { min: 0, max: 4 } }, plugins: { legend: { display: false } } }
            });
            chart2 = new Chart(document.getElementById('pressureChart'), {
                type: 'line',
                data: { datasets: [{ data: pressureLog.map(p => ({x: p.timeSec/60, y: p.pressure})), borderColor: '#3b82f6', fill: true }]},
                options: { scales: { x: { type: 'linear', min: 0, max: maxX } }, plugins: { legend: { display: false } } }
            });
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function applySettings() {
            configHours = document.getElementById('setHours').value;
            configIntervalMin = document.getElementById('setInterval').value;
            intervalSeconds = configIntervalMin * 60;
            document.getElementById('settingsModal').style.display = 'none';
        }
        function openSaveModal() { document.getElementById('saveModal').style.display = 'flex'; }
        function confirmSave() { location.reload(); }
        function closeChart() { document.getElementById('chartModal').style.display = 'none'; }
    </script>
</body>
</html>
